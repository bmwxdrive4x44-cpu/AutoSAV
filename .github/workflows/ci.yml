name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/marketplace_db?schema=public
      JWT_SECRET: ci-jwt-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: marketplace_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d marketplace_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Prisma Generate
        run: npm run db:generate

      - name: Push Schema
        run: npm run db:push

      - name: Verify Role Model
        run: npm run verify:roles

      - name: Smoke Test Workflow
        run: npm run smoke:workflow

      - name: Smoke Test Dispute Arbitration
        run: npm run smoke:dispute

      - name: Build
        run: npm run build
